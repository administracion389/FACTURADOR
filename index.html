<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facturador PuntoMed</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --verde:#00c853;--verde-oscuro:#009624;--fondo:#0d1117;--panel:#161b22;--borde:#30363d;--texto:#e6edf3;--texto-secundario:#8b949e;--rojo:#f85149;--azul:#58a6ff; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'IBM Plex Sans',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh}
    header{background:var(--panel);border-bottom:1px solid var(--borde);padding:16px 32px;display:flex;align-items:center;gap:16px}
    .logo{background:var(--verde);color:#000;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;padding:6px 12px;border-radius:4px;letter-spacing:1px}
    header h1{font-size:18px;font-weight:600}
    header span{font-size:12px;color:var(--texto-secundario);margin-left:auto;font-family:'IBM Plex Mono',monospace}
    .container{max-width:1100px;margin:0 auto;padding:32px 24px}
    #auth-section{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:24px;text-align:center}
    #auth-section h2{font-size:28px;font-weight:300}
    .token-form{background:var(--panel);border:1px solid var(--borde);border-radius:10px;padding:24px;max-width:500px;width:100%;text-align:left}
    .token-form h3{font-size:16px;margin-bottom:8px}
    .token-form p{font-size:13px;color:var(--texto-secundario);margin-bottom:16px;line-height:1.5}
    .token-form input{width:100%;background:var(--fondo);border:1px solid var(--borde);color:var(--texto);padding:10px 14px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:13px;margin-bottom:12px;outline:none;transition:border-color .2s}
    .token-form input:focus{border-color:var(--verde)}
    .btn-ml{background:var(--verde);color:#000;border:none;padding:12px 24px;font-size:14px;font-weight:600;font-family:'IBM Plex Sans',sans-serif;border-radius:6px;cursor:pointer;transition:background .2s;width:100%;display:block;text-align:center;text-decoration:none}
    .btn-ml:hover{background:var(--verde-oscuro);color:#fff}
    #app-section{display:none}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
    .top-bar h2{font-size:20px;font-weight:600}
    .badge{background:var(--verde);color:#000;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
    .btn-refresh{background:transparent;border:1px solid var(--borde);color:var(--texto);padding:8px 18px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:13px;transition:border-color .2s}
    .btn-refresh:hover{border-color:var(--verde);color:var(--verde)}
    .ventas-grid{display:flex;flex-direction:column;gap:16px}
    .venta-card{background:var(--panel);border:1px solid var(--borde);border-radius:10px;padding:24px;transition:border-color .2s}
    .venta-card:hover{border-color:var(--verde)}
    .venta-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
    .venta-id{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--texto-secundario)}
    .venta-monto{font-size:20px;font-weight:600;color:var(--verde);font-family:'IBM Plex Mono',monospace}
    .venta-producto{font-size:15px;font-weight:600;margin-bottom:16px}
    .datos-comprador{background:rgba(0,200,83,.05);border:1px solid rgba(0,200,83,.15);border-radius:8px;padding:16px;margin-bottom:16px}
    .datos-comprador h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--verde);margin-bottom:12px;font-family:'IBM Plex Mono',monospace}
    .dato-row{display:flex;gap:8px;margin-bottom:6px;font-size:14px;align-items:baseline}
    .dato-label{color:var(--texto-secundario);min-width:90px;font-size:12px}
    .loading{text-align:center;padding:60px;color:var(--texto-secundario);font-family:'IBM Plex Mono',monospace;font-size:14px}
    .spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--borde);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:60px;color:var(--texto-secundario);font-size:15px}
    .error-msg{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--rojo);padding:16px;border-radius:8px;font-size:14px;margin-bottom:20px}
    .info-box{background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--azul);margin-bottom:16px}
    .tag-pendiente{background:rgba(248,81,73,.15);color:var(--rojo);font-size:11px;padding:2px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace}
    .tag-facturado{background:rgba(0,200,83,.15);color:var(--verde);font-size:11px;padding:2px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace}
    .btn-ver{background:transparent;border:1px solid var(--azul);color:var(--azul);padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;text-decoration:none;transition:background .2s}
    .btn-ver:hover{background:rgba(88,166,255,.1)}
    .btn-facturado{background:transparent;border:1px solid var(--borde);color:var(--texto-secundario);padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .2s}
    .btn-facturado:hover{border-color:var(--verde);color:var(--verde)}
    .btn-facturado.done{background:rgba(0,200,83,.1);border-color:var(--verde);color:var(--verde)}
    .venta-footer{display:flex;gap:10px;flex-wrap:wrap}
  </style>
</head>
<body>
<header>
  <div class="logo">PM</div>
  <h1>Facturador PuntoMed</h1>
  <span id="usuario-nombre"></span>
</header>
<div class="container">
  <div id="auth-section">
    <h2>Facturador PuntoMed</h2>
    <div class="token-form">
      <h3>Opción 1: Pegar token existente</h3>
      <p>Si ya tienes un access token, pégalo aquí:</p>
      <input type="text" id="token-input" placeholder="APP_USR-..."/>
      <button class="btn-ml" onclick="conectarConToken()">✅ Conectar</button>
      <br/><br/>
      <div style="border-top:1px solid var(--borde);padding-top:16px">
        <h3>Opción 2: Autorizar cuenta ML</h3>
        <p>Haz clic para obtener un token nuevo:</p>
        <a id="btn-auth" class="btn-ml" href="#">🔗 Autorizar con Mercado Libre</a>
      </div>
    </div>
  </div>
  <div id="app-section">
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:12px">
        <h2>Ventas con solicitud de factura</h2>
        <span class="badge" id="contador-badge">0</span>
      </div>
      <button class="btn-refresh" onclick="cargarVentas()">↻ Actualizar</button>
    </div>
    <div id="error-container"></div>
    <div id="ventas-container" class="ventas-grid">
      <div class="loading"><div class="spinner"></div><br/>Cargando ventas...</div>
    </div>
  </div>
</div>
<script>
const CLIENT_ID='6043593506541220';
const CLIENT_SECRET='ZUggct6E0HGh3kJZk5jHqbahwpQrlctm';
const REDIRECT_URI='https://administracion389.github.io/FACTURADOR/';
const PROXY='https://api.allorigins.win/raw?url=';

document.getElementById('btn-auth').href=
  `https://auth.mercadolibre.cl/authorization?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;

let accessToken=localStorage.getItem('ml_token')||'';
let facturadas=JSON.parse(localStorage.getItem('facturadas')||'{}');

window.addEventListener('load',()=>{
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(code){
    window.history.replaceState({},document.title,REDIRECT_URI);
    intercambiarCodigo(code);
    return;
  }
  if(accessToken){mostrarApp();cargarVentas();}
});

async function intercambiarCodigo(code){
  document.getElementById('auth-section').innerHTML='<div class="loading"><div class="spinner"></div><br/>Conectando con Mercado Libre...</div>';
  try{
    const res=await fetch(PROXY+encodeURIComponent('https://api.mercadolibre.com/oauth/token'),{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:`grant_type=authorization_code&client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&code=${code}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
    });
    const data=await res.json();
    if(data.access_token){
      localStorage.setItem('ml_token',data.access_token);
      if(data.refresh_token)localStorage.setItem('ml_refresh',data.refresh_token);
      accessToken=data.access_token;
      mostrarApp();cargarVentas();
    }else{
      document.getElementById('auth-section').innerHTML=`<div class="token-form"><p style="color:var(--rojo)">Error: ${JSON.stringify(data)}</p><br/><a href="${REDIRECT_URI}" class="btn-ml">Volver a intentar</a></div>`;
    }
  }catch(e){
    document.getElementById('auth-section').innerHTML=`<div class="token-form"><p style="color:var(--rojo)">Error de conexión. Usa la Opción 1 con tu token.</p><br/><a href="${REDIRECT_URI}" class="btn-ml">Volver</a></div>`;
  }
}

function conectarConToken(){
  const val=document.getElementById('token-input').value.trim();
  if(!val){alert('Por favor pega el access_token');return;}
  localStorage.setItem('ml_token',val);
  accessToken=val;
  mostrarApp();cargarVentas();
}

function mostrarApp(){
  document.getElementById('auth-section').style.display='none';
  document.getElementById('app-section').style.display='block';
}

async function mlFetch(url){
  const res=await fetch(PROXY+encodeURIComponent(url),{
    headers:{'Authorization':`Bearer ${accessToken}`}
  });
  if(!res.ok)throw new Error(`Error ${res.status}`);
  return res.json();
}

async function cargarVentas(){
  const cont=document.getElementById('ventas-container');
  const errCont=document.getElementById('error-container');
  errCont.innerHTML='';
  cont.innerHTML='<div class="loading"><div class="spinner"></div><br/>Cargando ventas...</div>';
  try{
    const me=await mlFetch('https://api.mercadolibre.com/users/me');
    document.getElementById('usuario-nombre').textContent=me.nickname||'';
    const ordData=await mlFetch(`https://api.mercadolibre.com/orders/search?seller=${me.id}&sort=date_desc&limit=50`);
    const ordenes=ordData.results||[];
    const conFactura=ordenes.filter(o=>o.buyer?.billing_info?.doc_number||o.buyer?.billing_info?.company_name);
    if(conFactura.length===0){
      const todas=ordenes.slice(0,20);
      document.getElementById('contador-badge').textContent=todas.length;
      if(todas.length===0){cont.innerHTML='<div class="empty">No se encontraron ventas recientes.</div>';return;}
      errCont.innerHTML='<div class="info-box">ℹ️ Mostrando ventas recientes. Las que tengan datos de factura aparecerán destacadas.</div>';
      cont.innerHTML='';
      todas.forEach(o=>renderVenta(o,cont));
      return;
    }
    document.getElementById('contador-badge').textContent=conFactura.length;
    cont.innerHTML='';
    conFactura.forEach(o=>renderVenta(o,cont));
  }catch(err){
    cont.innerHTML='';
    errCont.innerHTML=`<div class="error-msg">⚠️ ${err.message}. <a href="#" onclick="cerrarSesion()" style="color:var(--rojo)">Reconectar</a></div>`;
  }
}

function renderVenta(orden,cont){
  const comprador=orden.buyer||{};
  const billing=comprador.billing_info||{};
  const item=orden.order_items?.[0]?.item||{};
  const monto=orden.total_amount||0;
  const ordenId=orden.id;
  const yaFacturada=facturadas[ordenId];
  const razon=billing.company_name||(comprador.first_name?comprador.first_name+' '+(comprador.last_name||''):'No disponible');
  const rut=billing.doc_number||'No disponible';
  const direccion=billing.city_name||'No disponible';
  const giro=billing.business_type||'No disponible';
  const linkVenta=`https://www.mercadolibre.cl/ventas/${ordenId}/detalle`;
  const card=document.createElement('div');
  card.className='venta-card';
  card.innerHTML=`
    <div class="venta-header">
      <div>
        <div class="venta-id">Orden #${ordenId}</div>
        <div style="margin-top:4px">${yaFacturada?'<span class="tag-facturado">✓ FACTURADA</span>':'<span class="tag-pendiente">PENDIENTE</span>'}</div>
      </div>
      <div class="venta-monto">$${Number(monto).toLocaleString('es-CL')}</div>
    </div>
    <div class="venta-producto">${item.title||'Producto sin título'}</div>
    <div class="datos-comprador">
      <h4>📋 Datos del comprador</h4>
      <div class="dato-row"><span class="dato-label">Razón social</span><span>${razon}</span></div>
      <div class="dato-row"><span class="dato-label">RUT</span><span>${rut}</span></div>
      <div class="dato-row"><span class="dato-label">Dirección</span><span>${direccion}</span></div>
      <div class="dato-row"><span class="dato-label">Giro</span><span>${giro}</span></div>
    </div>
    <div class="venta-footer">
      <a href="${linkVenta}" target="_blank" class="btn-ver">👁 Ver venta en ML</a>
      <button class="btn-facturado ${yaFacturada?'done':''}" onclick="marcarFacturada('${ordenId}')">
        ${yaFacturada?'✓ Facturada':'Marcar como facturada'}
      </button>
    </div>`;
  cont.appendChild(card);
}

function marcarFacturada(id){
  facturadas[id]=!facturadas[id];
  localStorage.setItem('facturadas',JSON.stringify(facturadas));
  cargarVentas();
}

function cerrarSesion(){
  localStorage.removeItem('ml_token');
  location.reload();
}
</script>
</body>
</html>
