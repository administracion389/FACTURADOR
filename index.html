<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facturador PuntoMed</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--verde:#00c853;--fondo:#0d1117;--panel:#161b22;--borde:#30363d;--texto:#e6edf3;--gris:#8b949e;--rojo:#f85149;--azul:#58a6ff}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'IBM Plex Sans',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh}
    header{background:var(--panel);border-bottom:1px solid var(--borde);padding:14px 28px;display:flex;align-items:center;gap:14px}
    .logo{background:var(--verde);color:#000;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;padding:5px 10px;border-radius:4px}
    header h1{font-size:17px;font-weight:600}
    #usuario{font-size:12px;color:var(--gris);margin-left:auto;font-family:'IBM Plex Mono',monospace}
    .container{max-width:1000px;margin:0 auto;padding:28px 20px}
    /* AUTH */
    #auth{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75vh;gap:20px}
    #auth h2{font-size:24px;font-weight:300}
    .card{background:var(--panel);border:1px solid var(--borde);border-radius:10px;padding:22px;max-width:480px;width:100%}
    .card h3{font-size:15px;margin-bottom:6px}
    .card p{font-size:13px;color:var(--gris);margin-bottom:14px;line-height:1.5}
    input[type=text]{width:100%;background:var(--fondo);border:1px solid var(--borde);color:var(--texto);padding:9px 13px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:13px;margin-bottom:10px;outline:none}
    input[type=text]:focus{border-color:var(--verde)}
    .btn{background:var(--verde);color:#000;border:none;padding:11px 20px;font-size:14px;font-weight:600;font-family:'IBM Plex Sans',sans-serif;border-radius:6px;cursor:pointer;width:100%;display:block;text-align:center;text-decoration:none;transition:opacity .2s}
    .btn:hover{opacity:.85}
    .btn-outline{background:transparent;border:1px solid var(--borde);color:var(--texto);padding:7px 15px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:border-color .2s}
    .btn-outline:hover{border-color:var(--verde);color:var(--verde)}
    .btn-azul{background:transparent;border:1px solid var(--azul);color:var(--azul);padding:7px 15px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;text-decoration:none;transition:background .2s}
    .btn-azul:hover{background:rgba(88,166,255,.1)}
    .btn-done{background:rgba(0,200,83,.1);border:1px solid var(--verde);color:var(--verde);padding:7px 15px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif}
    /* APP */
    #app{display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
    .topbar h2{font-size:19px;font-weight:600}
    .badge{background:var(--verde);color:#000;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:'IBM Plex Mono',monospace;margin-left:8px}
    .ventas{display:flex;flex-direction:column;gap:14px}
    .vcard{background:var(--panel);border:1px solid var(--borde);border-radius:10px;padding:20px;transition:border-color .2s}
    .vcard:hover{border-color:var(--verde)}
    .vcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px}
    .oid{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gris)}
    .monto{font-size:19px;font-weight:700;color:var(--verde);font-family:'IBM Plex Mono',monospace}
    .producto{font-size:14px;font-weight:600;margin-bottom:12px}
    .datos{background:rgba(0,200,83,.04);border:1px solid rgba(0,200,83,.12);border-radius:7px;padding:14px;margin-bottom:12px}
    .datos h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--verde);margin-bottom:10px;font-family:'IBM Plex Mono',monospace}
    .fila{display:flex;gap:8px;margin-bottom:5px;font-size:13px}
    .flabel{color:var(--gris);min-width:85px;font-size:12px}
    .acciones{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .tag-p{background:rgba(248,81,73,.12);color:var(--rojo);font-size:10px;padding:2px 7px;border-radius:4px;font-family:'IBM Plex Mono',monospace}
    .tag-f{background:rgba(0,200,83,.12);color:var(--verde);font-size:10px;padding:2px 7px;border-radius:4px;font-family:'IBM Plex Mono',monospace}
    .tag-msg{background:rgba(88,166,255,.12);color:var(--azul);font-size:10px;padding:2px 7px;border-radius:4px;font-family:'IBM Plex Mono',monospace}
    .loading{text-align:center;padding:50px;color:var(--gris);font-family:'IBM Plex Mono',monospace;font-size:13px}
    .spin{display:inline-block;width:22px;height:22px;border:2px solid var(--borde);border-top-color:var(--verde);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.25);color:var(--rojo);padding:14px;border-radius:7px;font-size:13px;margin-bottom:16px}
    .info{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.18);border-radius:7px;padding:11px 14px;font-size:13px;color:var(--azul);margin-bottom:16px}
    .sep{border:none;border-top:1px solid var(--borde);margin:16px 0}
    .manual-form{background:rgba(0,0,0,.3);border:1px solid var(--borde);border-radius:7px;padding:14px;margin-top:10px}
    .manual-form input{margin-bottom:7px;font-size:12px;padding:7px 11px}
    .manual-form label{font-size:11px;color:var(--gris);display:block;margin-bottom:3px}
    .manual-form h5{font-size:12px;color:var(--verde);margin-bottom:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px}
  </style>
</head>
<body>
<header>
  <div class="logo">PM</div>
  <h1>Facturador PuntoMed</h1>
  <span id="usuario"></span>
</header>
<div class="container">
  <div id="auth">
    <h2>Facturador PuntoMed</h2>
    <div class="card">
      <h3>Pegar Access Token</h3>
      <p>Pega aquí el access token obtenido con el comando del cmd:</p>
      <input type="text" id="tinput" placeholder="APP_USR-..."/>
      <button class="btn" onclick="conectar()">✅ Conectar</button>
      <hr class="sep"/>
      <h3>¿Sin token?</h3>
      <p>Haz clic para autorizar tu cuenta de ML y obtener uno automáticamente:</p>
      <a id="btnauth" class="btn" href="#">🔗 Autorizar con Mercado Libre</a>
    </div>
  </div>
  <div id="app">
    <div class="topbar">
      <div><h2>Ventas con solicitud de factura<span class="badge" id="nbadge">0</span></h2></div>
      <button class="btn-outline" onclick="cargar()">↻ Actualizar</button>
    </div>
    <div id="errbox"></div>
    <div id="ventas" class="ventas"><div class="loading"><div class="spin"></div><br/>Cargando...</div></div>
  </div>
</div>
<script>
const CID='6043593506541220';
const CSEC='ZUggct6E0HGh3kJZk5jHqbahwpQrlctm';
const RURI='https://administracion389.github.io/FACTURADOR/';
// Usar múltiples proxies con fallback
const PROXIES=[
  u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`
];

document.getElementById('btnauth').href=
  `https://auth.mercadolibre.cl/authorization?response_type=code&client_id=${CID}&redirect_uri=${encodeURIComponent(RURI)}`;

let token=localStorage.getItem('ml_token')||'';
let rtoken=localStorage.getItem('ml_rtoken')||'';
let facturadas=JSON.parse(localStorage.getItem('facturadas')||'{}');
let datosManual=JSON.parse(localStorage.getItem('datos_manual')||'{}');
let ventasGuardadas=JSON.parse(localStorage.getItem('ventas_guardadas')||'[]');

window.addEventListener('load',()=>{
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code');
  if(code){window.history.replaceState({},document.title,RURI);intercambiar(code);return;}
  if(token){mostrarApp();cargar();}
});

async function mlFetch(url){
  let lastErr;
  for(const proxy of PROXIES){
    try{
      const r=await fetch(proxy(url),{headers:{'Authorization':`Bearer ${token}`},signal:AbortSignal.timeout(8000)});
      if(r.ok)return await r.json();
      if(r.status===401){await refrescar();const r2=await fetch(proxy(url),{headers:{'Authorization':`Bearer ${token}`}});if(r2.ok)return await r2.json();}
      lastErr=new Error(`Error ${r.status}`);
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error('Sin conexión');
}

async function postML(url,body){
  let lastErr;
  for(const proxy of PROXIES){
    try{
      const r=await fetch(proxy(url),{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body,signal:AbortSignal.timeout(8000)});
      if(r.ok)return await r.json();
      lastErr=new Error(`Error ${r.status}`);
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error('Sin conexión');
}

async function refrescar(){
  if(!rtoken)return;
  try{
    const d=await postML('https://api.mercadolibre.com/oauth/token',
      `grant_type=refresh_token&client_id=${CID}&client_secret=${CSEC}&refresh_token=${rtoken}`);
    if(d.access_token){
      token=d.access_token;rtoken=d.refresh_token||rtoken;
      localStorage.setItem('ml_token',token);localStorage.setItem('ml_rtoken',rtoken);
    }
  }catch(e){console.warn('No se pudo refrescar token',e);}
}

async function intercambiar(code){
  document.getElementById('auth').innerHTML='<div class="loading"><div class="spin"></div><br/>Conectando...</div>';
  try{
    const d=await postML('https://api.mercadolibre.com/oauth/token',
      `grant_type=authorization_code&client_id=${CID}&client_secret=${CSEC}&code=${code}&redirect_uri=${encodeURIComponent(RURI)}`);
    if(d.access_token){
      token=d.access_token;rtoken=d.refresh_token||'';
      localStorage.setItem('ml_token',token);localStorage.setItem('ml_rtoken',rtoken);
      mostrarApp();cargar();
    }else{
      document.getElementById('auth').innerHTML=`<div class="card"><p style="color:var(--rojo)">Error: ${JSON.stringify(d)}</p><br/><a href="${RURI}" class="btn">Volver</a></div>`;
    }
  }catch(e){
    document.getElementById('auth').innerHTML=`<div class="card"><p style="color:var(--rojo)">Error de conexión. Usa la opción de pegar token.</p><br/><a href="${RURI}" class="btn">Volver</a></div>`;
  }
}

function conectar(){
  const v=document.getElementById('tinput').value.trim();
  if(!v){alert('Pega el token primero');return;}
  token=v;localStorage.setItem('ml_token',v);
  mostrarApp();cargar();
}

function mostrarApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
}

async function cargar(){
  const cont=document.getElementById('ventas');
  const err=document.getElementById('errbox');
  err.innerHTML='';
  cont.innerHTML='<div class="loading"><div class="spin"></div><br/>Cargando ventas...</div>';
  try{
    const me=await mlFetch('https://api.mercadolibre.com/users/me');
    document.getElementById('usuario').textContent=me.nickname||'';

    // Cargar órdenes con paginación
    let todas=[];
    let offset=0;
    const limit=50;
    while(true){
      const d=await mlFetch(`https://api.mercadolibre.com/orders/search?seller=${me.id}&sort=date_desc&limit=${limit}&offset=${offset}`);
      const res=d.results||[];
      todas=[...todas,...res];
      if(res.length<limit||todas.length>=200)break;
      offset+=limit;
    }

    // Guardar ventas nuevas en localStorage
    const ids=new Set(ventasGuardadas.map(v=>v.id));
    const nuevas=todas.filter(v=>!ids.has(v.id));
    ventasGuardadas=[...ventasGuardadas,...nuevas];
    // Limitar a últimas 500
    if(ventasGuardadas.length>500)ventasGuardadas=ventasGuardadas.slice(-500);
    localStorage.setItem('ventas_guardadas',JSON.stringify(ventasGuardadas));

    // Cargar mensajes para detectar solicitudes de factura
    await detectarSolicitudes(me.id, todas);

    // Filtrar ventas con solicitud de factura
    const conF=ventasGuardadas.filter(o=>
      o.buyer?.billing_info?.doc_number||
      o.buyer?.billing_info?.company_name||
      o._pideFactura||
      datosManual[o.id]
    );

    document.getElementById('nbadge').textContent=conF.length||todas.length;
    cont.innerHTML='';

    if(conF.length===0){
      err.innerHTML='<div class="info">ℹ️ Mostrando ventas recientes. Las que tengan datos de factura aparecerán destacadas.</div>';
      todas.slice(0,20).forEach(o=>renderVenta(o,cont));
    }else{
      conF.slice().reverse().forEach(o=>renderVenta(o,cont));
    }
  }catch(e){
    cont.innerHTML='';
    err.innerHTML=`<div class="err">⚠️ ${e.message}. <a href="#" onclick="cerrar()" style="color:var(--rojo)">Reconectar</a></div>`;
  }
}

async function detectarSolicitudes(userId, ordenes){
  const keywords=['factura','boleta','rut','razón social','razon social','giro','tributario'];
  for(const orden of ordenes.slice(0,30)){
    try{
      const msgs=await mlFetch(`https://api.mercadolibre.com/messages/packs/${orden.pack_id||orden.id}/sellers/${userId}?tag=post_sale`);
      const textos=(msgs.messages||[]).map(m=>(m.text||'').toLowerCase()).join(' ');
      if(keywords.some(k=>textos.includes(k))){
        orden._pideFactura=true;
        orden._mensajeFactura=textos.substring(0,200);
        // Actualizar en guardadas
        const idx=ventasGuardadas.findIndex(v=>v.id===orden.id);
        if(idx>=0){ventasGuardadas[idx]._pideFactura=true;ventasGuardadas[idx]._mensajeFactura=orden._mensajeFactura;}
      }
    }catch(e){/* mensaje no disponible */}
  }
  localStorage.setItem('ventas_guardadas',JSON.stringify(ventasGuardadas));
}

function renderVenta(orden,cont){
  const b=orden.buyer||{};
  const bill=b.billing_info||{};
  const item=orden.order_items?.[0]?.item||{};
  const id=orden.id;
  const yaf=facturadas[id];
  const manual=datosManual[id]||{};
  const pideF=orden._pideFactura;

  const razon=manual.razon||bill.company_name||(b.first_name?b.first_name+' '+(b.last_name||''):'—');
  const rut=manual.rut||bill.doc_number||'—';
  const dir=manual.dir||bill.city_name||'—';
  const giro=manual.giro||bill.business_type||'—';
  const link=`https://www.mercadolibre.cl/ventas/${id}/detalle`;

  const card=document.createElement('div');
  card.className='vcard';
  card.id=`c${id}`;
  card.innerHTML=`
    <div class="vcard-top">
      <div>
        <div class="oid">Orden #${id}</div>
        <div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap">
          ${yaf?'<span class="tag-f">✓ FACTURADA</span>':'<span class="tag-p">PENDIENTE</span>'}
          ${pideF?'<span class="tag-msg">💬 PIDE FACTURA</span>':''}
        </div>
      </div>
      <div class="monto">$${Number(orden.total_amount||0).toLocaleString('es-CL')}</div>
    </div>
    <div class="producto">${item.title||'Producto sin título'}</div>
    <div class="datos">
      <h4>📋 Datos del comprador</h4>
      <div class="fila"><span class="flabel">Razón social</span><span>${razon}</span></div>
      <div class="fila"><span class="flabel">RUT</span><span>${rut}</span></div>
      <div class="fila"><span class="flabel">Dirección</span><span>${dir}</span></div>
      <div class="fila"><span class="flabel">Giro</span><span>${giro}</span></div>
      ${orden._mensajeFactura?`<div class="fila" style="margin-top:6px"><span class="flabel" style="color:var(--azul)">Mensaje</span><span style="font-size:12px;color:var(--gris)">"${orden._mensajeFactura}..."</span></div>`:''}
    </div>
    <div class="acciones">
      <a href="${link}" target="_blank" class="btn-azul">👁 Ver en ML</a>
      <button class="btn-outline" onclick="toggleManual('${id}')">✏️ Ingresar datos</button>
      <button class="${yaf?'btn-done':'btn-outline'}" onclick="marcar('${id}')">
        ${yaf?'✓ Facturada':'Marcar facturada'}
      </button>
    </div>
    <div id="mf${id}" style="display:none">
      <div class="manual-form">
        <h5>Ingresar datos manualmente</h5>
        <label>Razón Social / Nombre</label>
        <input type="text" id="mr${id}" placeholder="Ej: ESTHETIC ANGELS SPA" value="${manual.razon||''}"/>
        <label>RUT</label>
        <input type="text" id="mu${id}" placeholder="Ej: 77677154-6" value="${manual.rut||''}"/>
        <label>Dirección</label>
        <input type="text" id="md${id}" placeholder="Ej: Badajoz 100, Las Condes" value="${manual.dir||''}"/>
        <label>Giro</label>
        <input type="text" id="mg${id}" placeholder="Ej: Servicios de estética" value="${manual.giro||''}"/>
        <button class="btn" style="margin-top:4px" onclick="guardarManual('${id}')">💾 Guardar datos</button>
      </div>
    </div>`;
  cont.appendChild(card);
}

function toggleManual(id){
  const el=document.getElementById(`mf${id}`);
  el.style.display=el.style.display==='none'?'block':'none';
}

function guardarManual(id){
  datosManual[id]={
    razon:document.getElementById(`mr${id}`).value,
    rut:document.getElementById(`mu${id}`).value,
    dir:document.getElementById(`md${id}`).value,
    giro:document.getElementById(`mg${id}`).value
  };
  localStorage.setItem('datos_manual',JSON.stringify(datosManual));
  cargar();
}

function marcar(id){
  facturadas[id]=!facturadas[id];
  localStorage.setItem('facturadas',JSON.stringify(facturadas));
  cargar();
}

function cerrar(){
  localStorage.removeItem('ml_token');
  location.reload();
}
</script>
</body>
</html>
